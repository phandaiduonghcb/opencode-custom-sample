version: '3.8'

services:
  devops-automation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops-automation-api
    ports:
      - "3000:3000"
    environment:
      # Azure Authentication
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      
      # Azure DevOps
      - AZURE_DEVOPS_ORG=${AZURE_DEVOPS_ORG}
      - AZURE_DEVOPS_PROJECT=${AZURE_DEVOPS_PROJECT}
      
      # OpenCode SDK
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
      
      # Application
      - PORT=3000
      - NODE_ENV=${NODE_ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DOCKER=true
      
      # Workspace
      - WORKSPACE_ROOT=/tmp/workflows
      - MAX_CONCURRENT_WORKFLOWS=${MAX_CONCURRENT_WORKFLOWS:-5}
    volumes:
      # Mount source code for development (hot reload)
      - ./server.js:/app/server.js
      - ./lib:/app/lib
      - ./workflows:/app/workflows
      - ./scripts:/app/scripts
      
      # Mount workspace directory for persistence during development
      - ./tmp/workflows:/tmp/workflows
      
      # Mount Azure CLI config for authentication
      - azure-cli:/root/.azure
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  azure-cli:
